server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    max-connections: 200
    max-threads: 50
    accept-count: 100
    connection-timeout: 5000

spring:
  application:
    name: boiler-monitor
  datasource:
    url: jdbc:h2:mem:boiler_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;CACHE_SIZE=65536
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 40
      minimum-idle: 10
      idle-timeout: 60000
      connection-timeout: 3000
      validation-timeout: 1000
      leak-detection-threshold: 5000
      max-lifetime: 1800000
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
        cache:
          use_second_level_cache: false
    database-platform: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  task:
    scheduling:
      pool:
        size: 2

app:
  data-update-interval: 1500
  cache-ttl-ms: 800
  request-rate-per-second: 50
  temperature:
    min: 40
    max: 180
  pressure:
    min: 0.5
    max: 3.0

logging:
  level:
    root: WARN
    com.boiler: INFO
    org.hibernate.SQL: WARN
    com.zaxxer.hikari: WARN
